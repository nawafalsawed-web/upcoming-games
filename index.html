<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Radar — الألعاب القادمة</title>
<meta name="description" content="تتبّع الألعاب القادمة: الأكثر ترقّبًا، المعلَنة بدون تاريخ، وتقويم شهري كامل.">
<style>
  :root{
    --bg:#0b0f17;--bg2:#121826;--card:#161d2e;--accent:#7c5cff;--accent2:#19c37d;
    --text:#eef1f7;--muted:#8b94a7;--line:#222b40;--today:#7c5cff22;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Segoe UI","Tahoma",system-ui,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#1b2440 0,transparent 60%),
               radial-gradient(900px 500px at 0% 0%,#241a3d 0,transparent 55%),var(--bg);
    color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;
  }
  header{text-align:center;padding:36px 20px 6px}
  .logo{display:inline-flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--accent2);box-shadow:0 0 12px var(--accent2);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  h1{font-size:clamp(26px,5vw,40px);font-weight:800;line-height:1.15;margin-bottom:6px}
  h1 span{background:linear-gradient(90deg,var(--accent),#c9a4ff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:15px}
  .wrap{max-width:1100px;margin:0 auto;padding:18px 20px 60px}

  /* التبويبات */
  .tabs{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:18px 0 8px}
  .tab{background:var(--card);border:1px solid var(--line);color:var(--muted);padding:11px 20px;border-radius:999px;cursor:pointer;font-size:15px;font-family:inherit;font-weight:700;transition:.2s;display:flex;align-items:center;gap:7px}
  .tab:hover{color:var(--text);border-color:var(--accent)}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tab .count{background:rgba(0,0,0,.25);border-radius:999px;font-size:11px;padding:1px 8px}
  .view{display:none}
  .view.active{display:block}
  .status{text-align:center;color:var(--muted);font-size:13px;min-height:18px;padding:8px}
  .status b{color:var(--accent2)}
  .sectionhint{text-align:center;color:var(--muted);font-size:13px;margin:4px 0 18px}

  /* بطاقات الألعاب الكبيرة */
  .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
  .fcard{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:.2s}
  .fcard:hover{transform:translateY(-3px);border-color:var(--accent)}
  .fcover{height:120px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;background-size:cover;background-position:center;position:relative;text-align:center;padding:0 12px}
  .fcover::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 25%,rgba(11,15,23,.75))}
  .fcover span{position:relative;z-index:1;text-shadow:0 2px 12px #000}
  .fbody{padding:13px}
  .fbody .fn{font-size:15px;font-weight:700;margin-bottom:7px;line-height:1.3}
  .fbody .fw{font-size:13px;color:var(--accent2);font-weight:700;margin-bottom:9px}
  .fcd{display:flex;gap:4px;text-align:center;margin-bottom:9px}
  .fcd .u{flex:1;background:#0d1320;border:1px solid var(--line);border-radius:7px;padding:6px 2px}
  .fcd .u b{display:block;font-size:16px;font-weight:800}
  .fcd .u small{font-size:9px;color:var(--muted)}
  .fdate{font-size:12px;color:var(--muted);margin-bottom:9px}
  .fplat{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px}
  .tag{font-size:11px;background:#0e1422;border:1px solid var(--line);color:var(--muted);padding:3px 9px;border-radius:6px}
  .btn{display:block;border:1px solid var(--accent);background:var(--accent);color:#fff;padding:8px;border-radius:9px;cursor:pointer;font-size:12px;font-family:inherit;text-decoration:none;text-align:center;transition:.2s}
  .btn:hover{filter:brightness(1.1)}

  /* التقويم */
  .navbar{display:flex;align-items:center;justify-content:center;gap:18px;margin:6px 0 8px}
  .navbar button{background:var(--card);border:1px solid var(--line);color:var(--text);width:42px;height:42px;border-radius:12px;cursor:pointer;font-size:19px;transition:.2s}
  .navbar button:hover{border-color:var(--accent)}
  .navbar .month{font-size:21px;font-weight:800;min-width:190px;text-align:center}
  .toprow{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .chip{background:var(--card);border:1px solid var(--line);color:var(--muted);padding:7px 14px;border-radius:999px;cursor:pointer;font-size:13px;font-family:inherit;transition:.2s}
  .chip:hover{color:var(--text);border-color:var(--accent)}
  .weekhead{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .weekhead div{text-align:center;color:var(--muted);font-size:13px;font-weight:700;padding:6px 0}
  .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cell{background:var(--card);border:1px solid var(--line);border-radius:12px;min-height:100px;padding:6px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
  .cell.empty{background:transparent;border:0}
  .cell.today{outline:2px solid var(--accent);background:var(--today)}
  .cell .num{font-size:13px;color:var(--muted);font-weight:700}
  .cell.today .num{color:var(--accent)}
  .ev{display:flex;align-items:center;gap:6px;background:#0e1422;border:1px solid var(--line);border-radius:8px;padding:3px 5px;cursor:pointer}
  .ev:hover{border-color:var(--accent)}
  .ev img{width:22px;height:22px;border-radius:5px;object-fit:cover;flex-shrink:0;background:#222}
  .ev span{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .more{font-size:11px;color:var(--accent);text-align:center}
  .listview{display:flex;flex-direction:column;gap:10px}
  .litem{display:flex;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;transition:.2s}
  .litem:hover{border-color:var(--accent)}
  .litem img{width:90px;height:48px;border-radius:8px;object-fit:cover;background:#222;flex-shrink:0}
  .litem .nm{font-size:16px;font-weight:700;margin-bottom:3px}
  .litem .dt{color:var(--muted);font-size:13px}
  .litem .cd{color:var(--accent2);font-size:13px;font-weight:700;margin-top:3px}

  /* النوافذ */
  .overlay{position:fixed;inset:0;background:rgba(5,8,14,.8);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;backdrop-filter:blur(4px)}
  .overlay.show{display:flex}
  .modal{background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--line);border-radius:18px;max-width:440px;width:100%;overflow:hidden}
  .modal.wide{max-width:680px}
  .modal .hero{height:185px;background-size:cover;background-position:center;position:relative}
  .modal .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,var(--card))}
  .modal .mb{padding:18px}
  .modal h3{font-size:22px;margin-bottom:6px}
  .modal .md{color:var(--muted);font-size:14px;margin-bottom:10px}
  .modal .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .cdbig{display:flex;gap:8px;text-align:center;margin-bottom:14px}
  .cdbig .u{flex:1;background:#0d1320;border:1px solid var(--line);border-radius:10px;padding:8px 4px}
  .cdbig .u b{display:block;font-size:21px;font-weight:800}
  .cdbig .u small{color:var(--muted);font-size:11px}
  .acts{display:flex;gap:8px}
  .acts .btn{flex:1}
  .acts .btn.sec{background:#0e1422;color:var(--text);border-color:var(--line)}
  .closex{position:absolute;top:10px;inset-inline-end:12px;z-index:2;background:rgba(0,0,0,.5);border:0;color:#fff;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:18px}
  .dayhead{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}
  .dayhead h3{font-size:20px}.dayhead small{color:var(--muted);font-size:13px;font-weight:400;margin-inline-start:8px}
  .daygrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;max-height:68vh;overflow:auto}
  .dcard{background:#0e1422;border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:.15s}
  .dcard:hover{border-color:var(--accent);transform:translateY(-2px)}
  .dimg{width:100%;aspect-ratio:460/215;background-size:cover;background-position:center;background-color:#1a2130}
  .dcard .dn{font-size:13px;font-weight:700;padding:9px 9px 3px;line-height:1.35}
  .dcard .dp{font-size:11px;color:var(--muted);padding:0 9px 10px}
  footer{text-align:center;color:var(--muted);font-size:13px;padding:24px 20px 40px}
  @media(max-width:600px){.cell{min-height:74px}.ev span{display:none}}
</style>
</head>
<body>
  <header>
    <div class="logo"><span class="dot"></span> GAME RADAR</div>
    <h1>الألعاب <span>القادمة</span></h1>
    <p class="sub">الأكثر ترقّبًا، المعلَنة بدون تاريخ، وتقويم شهري كامل.</p>
  </header>

  <div class="wrap">
    <div class="tabs" id="tabs">
      <button class="tab active" data-view="featured">🔥 الأكثر ترقّبًا <span class="count" id="c-featured"></span></button>
      <button class="tab" data-view="announced">📢 بدون تاريخ <span class="count" id="c-announced"></span></button>
      <button class="tab" data-view="calendar">📅 التقويم <span class="count" id="c-calendar"></span></button>
    </div>

    <!-- الأكثر ترقّبًا -->
    <div class="view active" id="view-featured">
      <div class="sectionhint">ألعاب كبيرة بمواعيد مؤكدة — مع عدّاد تنازلي وتذكير.</div>
      <div class="grid-cards" id="featuredGrid"></div>
    </div>

    <!-- معلَنة بدون تاريخ -->
    <div class="view" id="view-announced">
      <div class="sectionhint">ألعاب أُعلن عنها رسميًا لكن ما تحدّد موعدها بعد.</div>
      <div class="grid-cards" id="announcedGrid"></div>
    </div>

    <!-- التقويم -->
    <div class="view" id="view-calendar">
      <div class="navbar">
        <button onclick="changeMonth(1)">‹</button>
        <div class="month" id="monthLabel">—</div>
        <button onclick="changeMonth(-1)">›</button>
      </div>
      <div class="toprow">
        <button class="chip" onclick="goToday()">↺ الشهر الحالي</button>
        <button class="chip" id="viewToggle" onclick="toggleCalView()">📋 عرض كقائمة</button>
      </div>
      <div class="status" id="status"></div>
      <div id="calWrap">
        <div class="weekhead" id="weekhead"></div>
        <div class="calendar" id="calendar"></div>
      </div>
      <div class="listview" id="listview" style="display:none"></div>
    </div>
  </div>

  <div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal"></div>
  </div>

  <footer>المواعيد المؤكدة منسّقة يدويًا · التقويم يُحدّث تلقائيًا من Wikidata + Steam · Game Radar 🎮</footer>

<script>
/* ====== الأكثر ترقّبًا (مواعيد مؤكدة) ====== */
const FEATURED=[
  { name:"Grand Theft Auto VI", date:"2026-11-19", platforms:["PS5","Xbox Series"], color:["#ff7eb3","#7c5cff"] },
  { name:"Marvel's Wolverine", date:"2026-09-15", platforms:["PS5"], color:["#cb2d3e","#ef473a"] },
  { name:"Call of Duty: Modern Warfare 4", date:"2026-10-22", platforms:["PS5","Xbox Series","PC"], color:["#283e51","#4b79a1"] },
  { name:"Dune: Awakening (كونسول)", date:"2026-09-22", platforms:["PS5","Xbox Series"], color:["#c79081","#b5651d"] },
  { name:"Control: Resonant", date:"2026-09-24", platforms:["PC","PS5","Xbox Series"], color:["#283c86","#45a247"] },
  { name:"The Blood of Dawnwalker", date:"2026-09-02", platforms:["PC","PS5","Xbox Series"], color:["#5a0000","#1f1c18"] },
  { name:"Metal Gear Solid: Master Collection Vol. 2", date:"2026-08-27", platforms:["PC","PS5","Xbox Series","Switch 2"], color:["#414345","#232526"] },
  { name:"Digimon Story: Time Stranger", date:"2026-07-10", platforms:["Switch 2","PS5","PC"], color:["#0082c8","#667db6"] },
  { name:"Tomb Raider: Legacy of Atlantis", date:"2027-02-12", platforms:["PS5","Xbox Series","PC"], color:["#16222a","#3a6073"] },
  { name:"Fable", date:"2027-02-23", platforms:["Xbox Series","PC"], color:["#11998e","#38ef7d"] },
];

/* ====== معلَنة بدون تاريخ ====== */
const ANNOUNCED=[
  { name:"Resident Evil: Veronica (ريميك Code: Veronica)", window:"2027", platforms:["PS5","Xbox Series","Switch 2","PC"], color:["#8e0e00","#1f1c18"] },
  { name:"The Elder Scrolls VI", window:"لم يُعلن التاريخ بعد", platforms:["Xbox Series","PC"], color:["#3a7bd5","#00d2ff"] },
  { name:"The Witcher IV", window:"لا قبل 2027", platforms:["PS5","Xbox Series","PC"], color:["#7b4397","#dc2430"] },
  { name:"Spyro: A Realm Beyond", window:"أوائل 2027", platforms:["PS5","Xbox Series","Switch 2","PC"], color:["#f7971e","#ffd200"] },
  { name:"Clockwork Revolution", window:"2027", platforms:["Xbox Series","PC"], color:["#b06ab3","#4568dc"] },
  { name:"State of Decay 3", window:"2027", platforms:["Xbox Series","PC","PS5"], color:["#434343","#1c1c1c"] },
  { name:"Metro 2039", window:"فبراير 2027", platforms:["PS5","Xbox Series","PC"], color:["#232526","#414345"] },
  { name:"Atomic Heart 2", window:"غير محدد", platforms:["PS5","Xbox Series","PC"], color:["#cb356b","#bd3f32"] },
  { name:"Arma 4", window:"2027", platforms:["PC","Xbox Series"], color:["#3e5151","#decba4"] },
];

const WEEKDAYS=["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const MONTHS=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];

let GAMES=[], byDate={}, view=new Date(), listMode=false, timer=null;
view.setDate(1);
const statusEl=document.getElementById('status');
const pad=n=>String(n).padStart(2,'0');
const iso=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const parse=s=>new Date(s+"T00:00:00");
const fmtDate=d=>`${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
const px="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==";

/* ===== التبويبات ===== */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('view-'+t.dataset.view).classList.add('active');
});

/* ===== تذكير ===== */
function gcal(g){
  const d=parse(g.date);
  const s=iso(d).replace(/-/g,""), e=iso(new Date(d.getTime()+864e5)).replace(/-/g,"");
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent("إصدار "+g.name)}&dates=${s}/${e}&details=${encodeURIComponent("تذكير — Game Radar")}`;
}
function downloadICS(g){
  const d=parse(g.date), dt=iso(d).replace(/-/g,"");
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//GameRadar//AR//","BEGIN:VEVENT",
    "UID:"+(g.slug||g.name)+"@gameradar","DTSTART;VALUE=DATE:"+dt,"SUMMARY:إصدار "+g.name,
    "DESCRIPTION:تذكير — Game Radar","END:VEVENT","END:VCALENDAR"].join("\r\n");
  const a=document.createElement('a');
  a.href="data:text/calendar;charset=utf-8,"+encodeURIComponent(ics);
  a.download=g.name.replace(/[^\w]+/g,"_")+".ics";a.click();
}

/* ===== بطاقات الأقسام ===== */
function bigCard(g,i,dated){
  const cover=g.img?`background-image:url('${g.img}')`:`background:linear-gradient(135deg,${g.color[0]},${g.color[1]})`;
  const head=g.img?"":`<span>${g.name}</span>`;
  let mid;
  if(dated){
    const d=parse(g.date);
    mid=`<div class="fdate">📅 ${fmtDate(d)}</div><div class="fcd" data-fi="${i}"></div>`;
  } else {
    mid=`<div class="fw">⏳ ${g.window}</div>`;
  }
  const act=dated?`<a class="btn" href="${gcal(g)}" target="_blank" rel="noopener">📅 تذكير</a>`:"";
  return `<div class="fcard"><div class="fcover" style="${cover}">${head}</div>
    <div class="fbody"><div class="fn">${g.name}</div>${mid}
    <div class="fplat">${g.platforms.map(p=>`<span class="tag">${p}</span>`).join("")}</div>${act}</div></div>`;
}
function renderSections(){
  const fg=[...FEATURED].sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('featuredGrid').innerHTML=fg.map((g)=>bigCard(g,FEATURED.indexOf(g),true)).join("");
  document.getElementById('announcedGrid').innerHTML=ANNOUNCED.map((g,i)=>bigCard(g,i,false)).join("");
  document.getElementById('c-featured').textContent=FEATURED.length;
  document.getElementById('c-announced').textContent=ANNOUNCED.length;
  tickBig();
}
function tickBig(){
  document.querySelectorAll('.fcd').forEach(box=>{
    const g=FEATURED[box.dataset.fi];const d=parse(g.date);const diff=d-new Date();
    if(diff<=0){box.innerHTML='<div class="u" style="flex:1"><b>🎮 صدرت</b></div>';return}
    const dd=Math.floor(diff/864e5),hh=Math.floor(diff/36e5)%24,mm=Math.floor(diff/6e4)%60,ss=Math.floor(diff/1e3)%60;
    box.innerHTML=`<div class="u"><b>${dd}</b><small>يوم</small></div><div class="u"><b>${pad(hh)}</b><small>س</small></div><div class="u"><b>${pad(mm)}</b><small>د</small></div><div class="u"><b>${pad(ss)}</b><small>ث</small></div>`;
  });
}

/* ===== التقويم ===== */
function indexGames(){byDate={};GAMES.forEach(g=>{(byDate[g.date]=byDate[g.date]||[]).push(g)})}
function renderCalendar(){
  document.getElementById('monthLabel').textContent=MONTHS[view.getMonth()]+" "+view.getFullYear();
  if(listMode){renderList();return}
  document.getElementById('weekhead').innerHTML=WEEKDAYS.map(d=>`<div>${d}</div>`).join("");
  const cal=document.getElementById('calendar');cal.innerHTML="";
  const startDay=new Date(view.getFullYear(),view.getMonth(),1).getDay();
  const days=new Date(view.getFullYear(),view.getMonth()+1,0).getDate();
  const todayIso=iso(new Date());
  for(let i=0;i<startDay;i++)cal.insertAdjacentHTML('beforeend','<div class="cell empty"></div>');
  for(let d=1;d<=days;d++){
    const ds=view.getFullYear()+"-"+pad(view.getMonth()+1)+"-"+pad(d);
    const gs=byDate[ds]||[];
    let evs=gs.slice(0,3).map(g=>`<div class="ev" onclick='event.stopPropagation();openGame(${JSON.stringify(g).replace(/'/g,"&#39;")})'><img src="${g.img||px}" onerror="this.style.visibility='hidden'"><span>${g.name}</span></div>`).join("");
    if(gs.length>3)evs+=`<div class="more">+${gs.length-3} أخرى</div>`;
    const clk=gs.length?`onclick='openDay("${ds}")' style="cursor:pointer"`:'';
    cal.insertAdjacentHTML('beforeend',`<div class="cell ${ds===todayIso?'today':''}" ${clk}><div class="num">${d}</div>${evs}</div>`);
  }
}
function renderList(){
  const lv=document.getElementById('listview');
  const gs=GAMES.filter(g=>{const d=parse(g.date);return d.getMonth()===view.getMonth()&&d.getFullYear()===view.getFullYear()}).sort((a,b)=>a.date.localeCompare(b.date));
  lv.innerHTML=gs.length?gs.map(g=>{
    const days=Math.ceil((parse(g.date)-new Date())/864e5);
    return `<div class="litem" onclick='openGame(${JSON.stringify(g).replace(/'/g,"&#39;")})'>
      <img src="${g.img||px}" onerror="this.style.visibility='hidden'">
      <div><div class="nm">${g.name}</div><div class="dt">${fmtDate(parse(g.date))}</div>
      <div class="cd">${days<=0?"صدرت 🎮":"باقي "+days+" يوم"}</div></div></div>`;
  }).join(""):`<div class="status">لا توجد إصدارات هذا الشهر.</div>`;
}
function changeMonth(dir){view.setMonth(view.getMonth()+dir);renderCalendar()}
function goToday(){view=new Date();view.setDate(1);renderCalendar()}
function toggleCalView(){
  listMode=!listMode;
  document.getElementById('calWrap').style.display=listMode?'none':'block';
  document.getElementById('listview').style.display=listMode?'flex':'none';
  document.getElementById('viewToggle').textContent=listMode?'🗓 عرض كتقويم':'📋 عرض كقائمة';
  renderCalendar();
}

/* ===== نافذة لعبة ===== */
function openGame(g){
  const d=parse(g.date);const m=document.getElementById('modal');m.classList.remove('wide');
  m.innerHTML=`<div class="hero" style="background-image:url('${g.img||''}')"><button class="closex" onclick="closeModal()">×</button></div>
    <div class="mb"><h3>${g.name}</h3><div class="md">📅 ${fmtDate(d)}</div>
    <div class="tags">${[...(g.platforms||[]),...(g.genres||[])].slice(0,6).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
    <div class="cdbig" id="modalCd"></div>
    <div class="acts"><a class="btn" href="${gcal(g)}" target="_blank" rel="noopener">📅 تذكير Google</a>
    <button class="btn sec" onclick='downloadICS(${JSON.stringify(g).replace(/'/g,"&#39;")})'>⤓ ملف تقويم</button></div></div>`;
  document.getElementById('overlay').classList.add('show');
  const upd=()=>{const cd=document.getElementById('modalCd');if(!cd)return;const diff=d-new Date();
    if(diff<=0){cd.innerHTML='<div class="u" style="flex:1"><b>🎮 صدرت</b></div>';return}
    const dd=Math.floor(diff/864e5),hh=Math.floor(diff/36e5)%24,mm=Math.floor(diff/6e4)%60,ss=Math.floor(diff/1e3)%60;
    cd.innerHTML=`<div class="u"><b>${dd}</b><small>يوم</small></div><div class="u"><b>${pad(hh)}</b><small>ساعة</small></div><div class="u"><b>${pad(mm)}</b><small>دقيقة</small></div><div class="u"><b>${pad(ss)}</b><small>ثانية</small></div>`;};
  upd();clearInterval(timer);timer=setInterval(upd,1000);
}
function openDay(ds){
  const gs=byDate[ds]||[];if(!gs.length)return;const d=parse(ds);const m=document.getElementById('modal');m.classList.add('wide');
  m.innerHTML=`<div class="dayhead"><h3>${fmtDate(d)}<small>${gs.length} لعبة</small></h3><button class="closex" style="position:static" onclick="closeModal()">×</button></div>
    <div class="daygrid">${gs.map(g=>`<div class="dcard" onclick='openGame(${JSON.stringify(g).replace(/'/g,"&#39;")})'>
      <div class="dimg" style="background-image:url('${g.img||''}')"></div>
      <div class="dn">${g.name}</div><div class="dp">${(g.platforms||[]).slice(0,3).join(' · ')}</div></div>`).join("")}</div>`;
  document.getElementById('overlay').classList.add('show');
}
function closeModal(){document.getElementById('overlay').classList.remove('show');clearInterval(timer)}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

/* ===== تحميل بيانات التقويم ===== */
async function loadData(){
  statusEl.innerHTML="⏳ جاري التحميل...";
  try{
    const r=await fetch('games.json?t='+Date.now());
    if(r.ok){const j=await r.json();GAMES=j.games||[];indexGames();
      document.getElementById('c-calendar').textContent=GAMES.length;
      statusEl.innerHTML=`✅ <b>${GAMES.length}</b> لعبة في التقويم · آخر تحديث: ${j.updated?new Date(j.updated).toLocaleDateString('ar'):''}`;
      renderCalendar();return;}
  }catch(e){}
  statusEl.innerHTML="⚠️ تعذّر تحميل بيانات التقويم.";
}

renderSections();
setInterval(tickBig,1000);
renderCalendar();
loadData();
</script>
</body>
