<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Game Radar — رادار الألعاب القادمة</title>
<meta name="description" content="تتبّع الألعاب القادمة: الأكثر ترقّبًا، تقويم الإصدارات، قائمة متابعة وتذكيرات.">
<meta name="theme-color" content="#080a10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles2.css">
</head>
<body data-density="cozy">

  <!-- ===== app bar ===== -->
  <header class="appbar">
    <div class="brand">
      <span class="mk"></span>
      <b>GAME<span> RADAR</span></b>
    </div>
    <div class="grow"></div>
    <nav class="topnav">
      <button data-nav="discover">اكتشف</button>
      <button data-nav="browse">تصفّح</button>
      <button data-nav="calendar">التقويم</button>
      <button data-nav="wishlist">قائمتي</button>
    </nav>
    <button class="iconbtn" onclick="GR2.focusSearch()" aria-label="بحث">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
    </button>
  </header>

  <main class="wrap">

    <!-- ===== DISCOVER ===== -->
    <section class="page on" id="page-discover"></section>

    <!-- ===== BROWSE ===== -->
    <section class="page" id="page-browse">
      <div class="page-head"><h1>تصفّح الألعاب</h1><p>ابحث وفلتر بين كل الإصدارات القادمة.</p></div>
      <div class="options">
        <div class="searchbar">
          <input id="browseSearch" type="text" placeholder="ابحث باسم اللعبة، الاستوديو، أو التصنيف...">
          <span class="si"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg></span>
        </div>
        <div class="optrow" style="margin-bottom:10px">
          <div class="selectwrap"><select id="typeSel">
            <option value="all">الكل</option>
            <option value="dated">بموعد محدّد</option>
            <option value="undated">بدون تاريخ</option>
          </select></div>
          <div class="selectwrap"><select id="genreSel"></select></div>
          <div class="selectwrap"><select id="sortSel">
            <option value="hype">الأكثر ترقّبًا</option>
            <option value="date">الأقرب موعدًا</option>
            <option value="name">أبجديًا</option>
          </select></div>
        </div>
        <div class="optrow chips" id="platChips"></div>
      </div>
      <div class="result-count" id="browseCount"></div>
      <div class="grid" id="browseGrid"></div>
    </section>

    <!-- ===== CALENDAR ===== -->
    <section class="page" id="page-calendar">
      <div class="page-head"><h1>تقويم الإصدارات</h1></div>
      <div class="cal-top">
        <div class="cal-nav">
          <button id="calPrev" aria-label="السابق">›</button>
          <div class="cal-month" id="calMonth">—</div>
          <button id="calNext" aria-label="التالي">‹</button>
          <button class="btn soft" id="calToday" style="padding:9px 13px;font-size:12.5px">اليوم</button>
        </div>
        <div class="seg" id="calSeg">
          <button data-mode="month" class="on">شبكة</button>
          <button data-mode="agenda">قائمة</button>
        </div>
      </div>
      <div class="weekhead" id="weekhead"></div>
      <div class="calendar" id="calGrid"></div>
      <div class="agenda" id="calAgenda" style="display:none"></div>
    </section>

    <!-- ===== WISHLIST ===== -->
    <section class="page" id="page-wishlist">
      <div class="page-head" style="display:flex;align-items:flex-end;justify-content:space-between;gap:12px">
        <div><h1>قائمتي</h1><p>الألعاب التي تتابعها.</p></div>
        <div class="selectwrap"><select id="wishSortSel">
          <option value="date">الأقرب موعدًا</option>
          <option value="hype">الأكثر ترقّبًا</option>
        </select></div>
      </div>
      <div class="grid" id="wishGrid"></div>
    </section>

  </main>

  <!-- ===== bottom nav (mobile) ===== -->
  <nav class="bottomnav">
    <button data-nav="discover" class="on">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><polygon points="15.5 8.5 10.5 10.5 8.5 15.5 13.5 13.5" fill="currentColor" stroke="none"></polygon></svg>
      اكتشف
    </button>
    <button data-nav="browse">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="3" width="7.5" height="7.5" rx="2"></rect><rect x="13.5" y="3" width="7.5" height="7.5" rx="2"></rect><rect x="3" y="13.5" width="7.5" height="7.5" rx="2"></rect><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="2"></rect></svg>
      تصفّح
    </button>
    <button data-nav="calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="16.5" rx="3"></rect><path d="M3 9h18M8 2.5v4M16 2.5v4"></path></svg>
      التقويم
    </button>
    <button data-nav="wishlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 20s-7-4.5-9.5-9C1 8 2.5 4.5 6 4.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.5 0 5 3.5 3.5 6.5C19 15.5 12 20 12 20z"></path></svg>
      قائمتي
      <span class="badge-dot" id="wishBadge" style="display:none">0</span>
    </button>
  </nav>

  <!-- ===== detail sheet ===== -->
  <div class="scrim-overlay" id="scrim"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>

  <!-- ===== toast ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== tweaks root ===== -->
  <div id="tweaks-root"></div>

  <!-- ===== bundler thumbnail ===== -->
  <template id="__bundler_thumbnail" data-bg-color="#080a10">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#080a10"></rect>
      <g transform="translate(600,360)" fill="none" stroke="#2ee6be">
        <circle r="150" stroke-opacity="0.25" stroke-width="3"></circle>
        <circle r="95" stroke-opacity="0.4" stroke-width="3"></circle>
        <circle r="9" fill="#2ee6be" stroke="none"></circle>
      </g>
      <text x="600" y="640" text-anchor="middle" fill="#f3f5fa" font-family="sans-serif" font-weight="800" font-size="62" letter-spacing="4">GAME RADAR</text>
    </svg>
  </template>

  <!-- ===== data + app ===== -->
  <script src="data.js"></script>
  <script src="app2.js"></script>
</body>
</html>
